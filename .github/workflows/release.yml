name: Release

# Changesets-driven release. On every push to `main`:
#   1. `version` runs changesets/action. While changesets are pending it
#      opens/updates a "Version Packages" PR (bumping package.json + writing
#      CHANGELOG.md). Once that PR merges — no changesets left — the step no-ops
#      and the gate below decides whether the freshly-bumped version needs
#      releasing (i.e. isn't already tagged).
#   2. `release` (only when there's a new, un-tagged version) builds the macOS
#      app bundle, zips it, pushes the `v<version>` tag, and publishes a GitHub
#      Release with the changelog notes and the zip attached.
#
# There is no npm publish — the app is private and shipped as a macOS binary.
on:
  push:
    branches: [main]
  # Manual re-run against the current main commit.
  workflow_dispatch:

# Don't let two pushes race the Version PR / a release.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  # create/upload the GitHub Release and push the version tag
  contents: write
  # changesets/action opens the "Version Packages" PR
  pull-requests: write

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags so changesets can build changelogs and the
          # release gate below can see existing version tags.
          fetch-depth: 0
          # changesets/action sets its own git credentials; leaving checkout's
          # persisted http.extraheader in place causes "Duplicate header:
          # Authorization" on push (actions/checkout#2299).
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # While changesets are pending, opens/updates the "Version Packages" PR.
      # Once that PR merges (no changesets left) this no-ops — we don't publish
      # to npm, so no `publish` command is given.
      - name: Create Version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          commit: "chore(release): version"
          title: "chore(release): version"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Runs only when there are no pending changesets — i.e. nothing to PR.
      # That's either a routine push (version already tagged → skip) or a just
      # -merged Version PR (new, un-tagged version → release).
      - name: Decide whether to release
        id: check
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "v$VERSION already tagged — nothing to release"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$VERSION is not yet released — building"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build & publish macOS app
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: macos-15
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: adapters/pnpm-lock.yaml

      - name: Show Swift version
        run: swift --version

      # Builds the release binary, compiles the adapters, and assembles
      # "dist/StatusBar.app" (see scripts/build-app.sh).
      - name: Build app bundle
        run: make app

      # Code signing + notarization is optional and gated on the secrets being
      # present — exactly like super-review, which only signs when its Apple
      # secrets exist and otherwise ships an unsigned build. With a Developer ID
      # cert + notarization, Gatekeeper opens the app cleanly; without it, the
      # ad-hoc-signed build still ships (users get the "unidentified developer"
      # prompt). MAC_CSC_LINK must never be exported empty, so we branch on it.
      - name: Sign, notarize & package
        id: package
        env:
          # Base64-encoded Developer ID Application certificate (.p12) + its password.
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Apple account used for notarytool.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="dist/StatusBar.app"
          ASSET="StatusBar-${VERSION}-macos-arm64.zip"

          if [ -n "$MAC_CSC_LINK" ]; then
            echo "› Developer ID cert present — signing + notarizing"

            # Import the cert into a throwaway keychain scoped to this run.
            KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
            KEYCHAIN_PW="$(uuidgen)"
            CERT_PATH="$RUNNER_TEMP/cert.p12"
            echo "$MAC_CSC_LINK" | base64 --decode > "$CERT_PATH"
            security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MAC_CSC_KEY_PASSWORD" \
              -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
            # Put our keychain in the search list so codesign can find the identity.
            security list-keychains -d user -s "$KEYCHAIN" \
              $(security list-keychains -d user | tr -d '"')

            IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
              | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
            echo "› Signing as: $IDENTITY"

            # Hardened runtime is required for notarization. A plain Swift app
            # needs no extra entitlements (unlike Electron).
            codesign --force --deep --options runtime --timestamp \
              --sign "$IDENTITY" --keychain "$KEYCHAIN" "$APP"
            codesign --verify --strict --verbose=2 "$APP"

            # notarytool takes a zip of the bundle.
            ditto -c -k --sequesterRsrc --keepParent "$APP" "$ASSET"
            xcrun notarytool submit "$ASSET" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait

            # Staple the ticket onto the app, then re-zip so the shipped archive
            # carries it (Gatekeeper reads it offline on first launch).
            xcrun stapler staple "$APP"
            rm -f "$ASSET"
            ditto -c -k --sequesterRsrc --keepParent "$APP" "$ASSET"

            security delete-keychain "$KEYCHAIN"
          else
            echo "› No MAC_CSC_LINK secret — shipping the unsigned (ad-hoc) build"
            ditto -c -k --sequesterRsrc --keepParent "$APP" "$ASSET"
          fi

          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        run: |
          # Pull this version's section out of CHANGELOG.md (everything between
          # "## <version>" and the next "## ") for the release body.
          awk -v ver="## $VERSION" '
            $0 == ver {flag=1; next}
            /^## / && flag {exit}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section for $VERSION — release will have no notes"
          fi

      - name: Tag and publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="v$VERSION"
          # Tag the exact commit that was built (the run's triggering SHA).
          git tag "$V" "${{ github.sha }}"
          git push origin "$V"
          TITLE="StatusBar $V"
          if [ -s release-notes.md ]; then
            gh release create "$V" --title "$TITLE" --notes-file release-notes.md \
              --latest "${{ steps.package.outputs.asset }}"
          else
            gh release create "$V" --title "$TITLE" --generate-notes \
              --latest "${{ steps.package.outputs.asset }}"
          fi
